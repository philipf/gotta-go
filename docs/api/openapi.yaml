# GottaGo — Radiator ↔ Worker HTTP contract
#
# Authoritative wire specification for the one HTTP call a **radiator** (firmware)
# makes to the **Worker** (Cloudflare Worker backend) on every **wake cycle**.
#
# This file is the single source of truth for the *what* of the contract:
# paths, headers, status codes, response shapes, value ranges. The matching
# *why* — every rationale, trade-off and rejected alternative — lives in
# ADR-0003 (../adr/0003-radiator-worker-contract.md). Update both together.
#
# Every domain term used below (radiator, frame, profile phase, sleep duration,
# idle profile, hardware id, …) is defined in ../glossary.md. Field
# descriptions intentionally reach for the glossary's canonical names rather
# than inventing local synonyms.

openapi: 3.1.0

info:
  title: GottaGo Radiator–Worker Contract
  version: 1.0.0
  summary: HTTP contract a radiator speaks to the Worker on every wake cycle.
  description: |
    The wire surface the **radiator** firmware uses to fetch its next rendered
    **frame** and its next **sleep duration** from the **Worker**.

    ## Design invariant — "Dumb Radiator, Smart Edge"

    Per PRD §8 the radiator performs zero data processing. This contract keeps
    that invariant:

    - The radiator parses exactly three response artefacts: the gzipped BMP
      body (mechanical decompress + flush), the integer `X-Sleep-Seconds`
      header, and the opaque `ETag` string (stored and echoed back as
      `If-None-Match`, never inspected — ADR-0013).
    - All status codes collapse to a mechanical firmware decision: flush
      (`200`), skip (`304`), or error screen (non-2xx). Everything else is
      sleep.
    - Sleep authority lives entirely on the Worker whenever the radiator
      reaches it; the firmware's 300 s fallback is a recovery floor, not a
      participant in normal operation.

    ## Versioning

    The `/v1/` segment is the contract version. A future incompatible bump
    (binary header format, different auth model, …) ships at `/v2/frame` and
    runs side-by-side with `/v1/frame` long enough to re-flash every radiator.
    Cheaper than a flag-day cutover for a small fleet; intentionally expensive
    enough to discourage frivolous bumps.

    ## Reserved header namespace

    The `X-Radiator-*` request-header prefix is reserved for radiator-side
    telemetry. Realized so far: `X-Radiator-Hardware-Id` and
    `X-Radiator-Battery-Mv`; future candidates include firmware version and
    Wi-Fi RSSI. The Worker MUST ignore unknown headers in this namespace so
    firmware can add telemetry without a Worker change or a contract version
    bump.

    ## Cross-references

    - **Rationale & rejected alternatives:** [ADR-0003](../adr/0003-radiator-worker-contract.md).
    - **Error contract (`problem+json`):** [ADR-0011](../adr/0011-error-contract-problem-details.md) and [errors.md](errors.md).
    - **Conditional frame requests (`ETag`/`304`):** [ADR-0013](../adr/0013-conditional-frame-requests.md).
    - **Terminology:** [glossary](../glossary.md).
    - **Frame compression:** [ADR-0001](../adr/0001-frame-transport-compression.md).
    - **Metlink upstream contract:** [Metlink reference](../reference/metlink-stop-predictions.md).
  contact:
    name: GottaGo project
    url: https://github.com/philipf/gotta-go

servers:
  - url: https://{worker_host}
    description: Deployed Cloudflare Worker. `worker_host` is environment-specific.
    variables:
      worker_host:
        default: gotta-go.example.workers.dev
        description: Hostname of the deployed Worker.

tags:
  - name: frame
    description: |
      Frame retrieval. The single endpoint the radiator hits on every
      **wake cycle**.

# Every operation requires the shared token. Declared once here so each path
# inherits it automatically.
security:
  - radiatorSharedToken: []

paths:
  /v1/frame:
    get:
      tags: [frame]
      operationId: getFrame
      summary: Fetch the next rendered frame and sleep instruction.
      description: |
        Called by the radiator on every wake cycle. The Worker:

        1. Authenticates the request via `X-Radiator-Token` (see
           `radiatorSharedToken`).
        2. Resolves the **radiator slug** (`X-Radiator-Slug`) against the
           `radiators:` block in `config.yaml`.
        3. Resolves the active **profile phase** for the server's current
           time; if no configured phase matches, falls through to the
           **idle profile** — the response is still `200`.
        4. Builds the **view model** and derives the weak **ETag** from it;
           if the request's `If-None-Match` matches (`image/bmp` path only),
           returns `304 Not Modified` with no body — the render pipeline
           never runs (ADR-0013).
        5. Otherwise renders the **frame**, gzips it, returns it with the
           `ETag` and the next **sleep duration** in `X-Sleep-Seconds`.

        ### Idle-profile behaviour

        When server time falls outside every configured `start_time` /
        `end_time` window for the slug, the response is `200 OK` with a frame
        from the idle profile and
        `X-Sleep-Seconds = min(seconds_until_next_configured_phase_start, 14400)`.
        `X-Profile-Phase` is set to the literal `idle_profile`.

        ### Observability headers

        On success (and on most error paths) the Worker also sets
        `X-Server-Time` and `X-Profile-Phase`. These are diagnostic data for
        humans running `curl` — the firmware ignores them. New `X-*` response
        headers may be added unilaterally; the radiator simply does not read
        response headers it does not act on.

        ### Diagnostics view — content negotiation (ADR-0004)

        The same endpoint serves two diagnostics variants via the request's
        `Accept` header. `Accept: application/json` returns a JSON **view model**:
        the structured data fed to the renderer for *this exact* render (active
        profile phase, layout, the per-column **transit target** fields, plus the
        observability values that also ride the response headers).
        `Accept: image/svg+xml` returns the intermediate Satori SVG — the exact
        document the BMP encoder rasterises for this render — gzipped per
        ADR-0001, so a human can open it in a browser to inspect typography and
        layout without flashing firmware. The radiator's path — `Accept:
        image/bmp` or no `Accept` — is byte-identical to before. Auth, slug
        resolution, sleep-duration logic, and the observability headers are
        unchanged across every variant; only the response body and
        `Content-Type` differ. With `Accept: application/json`, adding
        `?include_bmp=1` appends a `frame_bmp_base64` field decoding to the
        exact BMP an `Accept: image/bmp` sibling call would have returned.

        ### Conditional frame requests (ADR-0013)

        The `200` carries a **weak `ETag`** derived from the render's content
        inputs — the layout's serialised view model plus its `LAYOUT_VERSION`
        constant — never from the rendered bytes, so an unchanged frame is
        detected without running the render pipeline. The radiator stores the
        ETag (only after a successfully flushed `200`) and sends it back as
        `If-None-Match` on its next wake; on a match the Worker returns
        `304 Not Modified` with no body and the usual `X-Sleep-Seconds`, and
        the firmware performs an **unchanged-frame skip**: it does not touch
        the panel and deep-sleeps.

        **Only the `image/bmp` path participates.** The JSON and SVG
        diagnostics variants always return `200`, even when the request
        carries a matching `If-None-Match` — a human on the diagnostics
        surface came to see the data. Error paths are likewise unaffected: a
        non-2xx returns its problem document regardless of `If-None-Match`.

        ### Error responses (RFC 9457)

        Every non-2xx response is an `application/problem+json` **problem
        document** (RFC 9457) — *regardless of the negotiated success format
        above*. A radiator that asked for `image/bmp` still receives
        `problem+json` on failure; the status code, not the body, drives the
        firmware's "flush a frame or show the error screen" decision. Each
        document carries a `type` URL that dereferences to the matching anchor
        in [errors.md](errors.md) (`metlink-auth`, `unauthorized`, …), a `title`
        (the firmware error-screen heading), the `status`, a per-occurrence
        `detail`, an optional `instance`, and — for upstream failures — a
        verbose-gated `upstream_detail` snippet (≤ 2 KB). `X-Sleep-Seconds`
        stays a **header** on these responses, never a body member. The
        full failure-policy rationale and the status×class taxonomy behind the
        per-type status codes, sleeps, and log levels live in
        [ADR-0011](../adr/0011-error-contract-problem-details.md). Unknown paths
        (a human with `curl`, never a radiator) return a `404` `not-found`
        problem document.
      parameters:
        - $ref: '#/components/parameters/RadiatorSlug'
        - $ref: '#/components/parameters/AcceptEncodingGzip'
        - $ref: '#/components/parameters/AcceptVariant'
        - $ref: '#/components/parameters/IfNoneMatch'
        - $ref: '#/components/parameters/IncludeBmp'
        - $ref: '#/components/parameters/RadiatorHardwareId'
        - $ref: '#/components/parameters/RadiatorBatteryMv'
      responses:
        '200':
          $ref: '#/components/responses/FrameOk'
        '304':
          $ref: '#/components/responses/FrameNotModified'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
        '502':
          $ref: '#/components/responses/UpstreamError'
        '503':
          $ref: '#/components/responses/Maintenance'

components:

  # -----------------------------------------------------------------------
  # Security
  # -----------------------------------------------------------------------

  securitySchemes:
    radiatorSharedToken:
      type: apiKey
      in: header
      name: X-Radiator-Token
      description: |
        The **shared token** — a single opaque value (≥ 32 chars,
        CSPRNG-generated) sent by every radiator. Stored on the Worker as
        the `RADIATOR_SHARED_TOKEN` secret. Treat as a bearer credential.

        **Failure modes are deliberately indistinguishable** — a missing
        `X-Radiator-Token` and an invalid `X-Radiator-Token` both produce a
        `401 Unauthorized` with the same body. This removes a
        token-vs-no-token oracle and collapses two rejection paths into one
        on the Worker.

  # -----------------------------------------------------------------------
  # Request parameters (headers only — GET, no body, no query string)
  # -----------------------------------------------------------------------

  parameters:

    RadiatorSlug:
      name: X-Radiator-Slug
      in: header
      required: true
      description: |
        The **radiator slug** identifying which radiator is calling. Must
        match a key under `radiators:` in `config.yaml`. Hardcoded as a
        compile-time firmware constant.

        Identification, not authentication. With a closed surface area
        (a 5-radiator household) an unknown slug returns `404` rather than
        `401` — the readability and operational clarity win outweigh the
        negligible information leak.
      schema:
        $ref: '#/components/schemas/RadiatorSlug'
      example: bedroom-philip-tania

    AcceptEncodingGzip:
      name: Accept-Encoding
      in: header
      required: true
      description: |
        Must include `gzip`. Per ADR-0001 the Worker always returns the
        frame body with `Content-Encoding: gzip` — an uncompressed BMP is
        too large for the radiator's bandwidth and battery budget.
      schema:
        type: string
        pattern: '(^|, *)gzip(,|$)'
      example: gzip

    AcceptVariant:
      name: Accept
      in: header
      required: false
      description: |
        Selects the response variant via HTTP content negotiation (ADR-0004):

        - `image/bmp`, `*/*`, or **absent** — the gzipped 1-bit BMP frame. This
          is the radiator's path and is byte-identical to a request with no
          `Accept` at all.
        - `application/json` — the JSON **view model** envelope describing the
          render fed to Satori for this request (see `FrameViewModelEnvelope`).
        - `image/svg+xml` — the intermediate Satori SVG the BMP encoder
          rasterises for this render, gzipped per ADR-0001. Open it in a browser
          to inspect typography and layout without flashing firmware.

        The radiator never sends this header; it is a diagnostics affordance for
        humans and tests running `curl`.
      schema:
        type: string
      example: application/json

    IfNoneMatch:
      name: If-None-Match
      in: header
      required: false
      description: |
        The **conditional frame request** validator (ADR-0013): the weak
        **ETag** the radiator stored from its last successfully flushed `200`,
        echoed back verbatim. When it matches the ETag the Worker derives for
        this render's content inputs, the response is `304 Not Modified` with
        no body and the firmware performs an **unchanged-frame skip**.

        Only meaningful on the `image/bmp` path — the JSON and SVG
        diagnostics variants always return `200`. Absent on first boot, after
        a re-flash, or after the firmware rendered an error screen (which
        clears the stored ETag); the response is then a normal `200`.
      schema:
        $ref: '#/components/schemas/WeakETag'
      example: W/"9f3a51c87b20e6d4"

    IncludeBmp:
      name: include_bmp
      in: query
      required: false
      description: |
        Only meaningful alongside `Accept: application/json`. When set to `1`,
        the JSON envelope gains a `frame_bmp_base64` field whose decoded bytes
        are byte-identical to the BMP an `Accept: image/bmp` sibling call would
        have returned at the same instant. Default off — the field is absent —
        keeping the common diagnostics response small. Ignored for the
        `image/bmp` variant.
      schema:
        type: string
        enum: ['1']
      example: '1'

    RadiatorHardwareId:
      name: X-Radiator-Hardware-Id
      in: header
      required: false
      description: |
        The **hardware id** — a stable per-board identifier (typically the
        ESP32-S3 MAC address). Distinct from the **radiator slug**: it
        survives slug reassignment, so the Worker can track which physical
        board carries which slug across re-flashes.

        Optional; radiators MAY omit it. It was the first entry in the
        reserved `X-Radiator-*` namespace — `X-Radiator-Battery-Mv` has since
        joined it, and future telemetry headers (firmware version, Wi-Fi
        RSSI, …) will do the same without a contract version bump.
      schema:
        type: string
        maxLength: 64
      example: 24:6F:28:AA:BB:CC

    RadiatorBatteryMv:
      name: X-Radiator-Battery-Mv
      in: header
      required: false
      description: |
        The **battery level** — the radiator's raw battery voltage in
        millivolts, sampled once per **wake cycle** before Wi-Fi starts.
        Deliberately raw and uninterpreted: the discharge curve, any
        percentage mapping, and charging detection live server-side so they
        stay tweakable without reflashing firmware.

        Optional; radiators MAY omit it (older firmware, or a failed read —
        firmware omits the header rather than sending a zero). The Worker
        only logs the value as the numeric `batteryMv` field; it never
        influences the response.
      schema:
        type: integer
        minimum: 0
      example: 3942

  # -----------------------------------------------------------------------
  # Reusable responses
  # -----------------------------------------------------------------------

  responses:

    FrameOk:
      description: |
        Valid request. By default — `Accept: image/bmp` or no `Accept` — the
        rendered frame is in the body and the next sleep duration is in
        `X-Sleep-Seconds`. With `Accept: application/json` the body is instead
        the JSON **view model** for this render (ADR-0004); with
        `Accept: image/svg+xml` it is the intermediate Satori SVG. The headers
        are identical across all variants. The `200` is also used for the
        idle-profile fall-through (see the operation description).

        `Content-Encoding: gzip` applies to the `image/bmp` and `image/svg+xml`
        bodies (per ADR-0001, honouring `Accept-Encoding`); the JSON variant is
        returned uncompressed.
      headers:
        Content-Encoding:
          $ref: '#/components/headers/ContentEncodingGzip'
        ETag:
          $ref: '#/components/headers/FrameETag'
        X-Sleep-Seconds:
          $ref: '#/components/headers/SleepSeconds'
        X-Server-Time:
          $ref: '#/components/headers/ServerTime'
        X-Profile-Phase:
          $ref: '#/components/headers/ProfilePhase'
      content:
        image/bmp:
          schema:
            type: string
            format: binary
            description: |
              1-bit 960×540 BMP per PRD §7. Uncompressed size is exactly
              64,862 bytes. On the wire the body is gzipped — Cloudflare's
              edge auto-compression skips `image/*`, so the explicit
              `Content-Encoding: gzip` header is honoured end-to-end.
        application/json:
          schema:
            $ref: '#/components/schemas/FrameViewModelEnvelope'
        image/svg+xml:
          schema:
            type: string
            format: binary
            description: |
              The intermediate Satori SVG fed to the BMP encoder for this
              render (ADR-0004) — a well-formed SVG document at the panel's
              960×540 geometry. Returned only for `Accept: image/svg+xml`. On
              the wire the body is gzipped like the BMP (`Content-Encoding:
              gzip` per ADR-0001); gunzip it to a browser-openable `.svg`.

    FrameNotModified:
      description: |
        The frame's content inputs are unchanged since the ETag the request
        presented in `If-None-Match` — the radiator's panel already shows
        this frame, so there is nothing to redraw (ADR-0013). **No body**, no
        `Content-Type`; the render pipeline never ran. The Workers runtime's
        encoding negotiation appends an incidental `Content-Encoding: gzip`
        header when the request advertised `Accept-Encoding: gzip` (the same
        runtime behaviour GH #13 documented); there is no body to decode, so
        clients ignore it — RFC 9110 permits representation metadata on a
        `304`.

        `X-Sleep-Seconds` is still set — sleep authority rides every
        response (ADR-0003) — and the firmware performs an
        **unchanged-frame skip**: parse `X-Sleep-Seconds`, do not touch the
        panel, keep the stored ETag, deep-sleep. The `ETag` is repeated per
        RFC 9110 §15.4.5; the firmware ignores it (a new ETag is stored only
        on a successfully flushed `200`).

        Returned only on the `image/bmp` path. The JSON and SVG diagnostics
        variants always answer `200`; error paths return their problem
        document regardless of `If-None-Match`.
      headers:
        ETag:
          $ref: '#/components/headers/FrameETag'
        X-Sleep-Seconds:
          $ref: '#/components/headers/SleepSeconds'
        X-Server-Time:
          $ref: '#/components/headers/ServerTime'
        X-Profile-Phase:
          $ref: '#/components/headers/ProfilePhase'

    Unauthorized:
      description: |
        **Problem type `unauthorized`** (Fatal). `X-Radiator-Token` was missing
        or did not match the configured `RADIATOR_SHARED_TOKEN`. The two cases
        are indistinguishable by design. Logged at `warn`; sleep `3600`.
      headers:
        Content-Type:
          $ref: '#/components/headers/ContentTypeProblemJson'
        X-Sleep-Seconds:
          $ref: '#/components/headers/SleepSecondsAuthError'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          example:
            type: https://github.com/philipf/gotta-go/blob/main/docs/api/errors.md#unauthorized
            title: Radiator not authorised
            status: 401
            detail: The X-Radiator-Token header was missing or did not match the configured shared token.
            instance: urn:gotta-go:request:01HFV0Q3K8N2W7E6R5T4Y3U2I1

    NotFound:
      description: |
        A `404`, one of two problem types:

        - **`unknown-radiator`** (Fatal) — `X-Radiator-Slug` matched no key under
          `radiators:` in `config.yaml`. See the `X-Radiator-Slug` parameter for
          why an unknown slug is a `404`, not a `401`. Logged at `warn`; sleep
          `3600`.
        - **`not-found`** — the request path matched no route (a human with
          `curl`, never a radiator). No `X-Sleep-Seconds`; the firmware's `300 s`
          fallback covers the theoretical case.
      headers:
        Content-Type:
          $ref: '#/components/headers/ContentTypeProblemJson'
        X-Sleep-Seconds:
          $ref: '#/components/headers/SleepSecondsAuthError'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            unknown-radiator:
              summary: Slug not configured (sleep 3600)
              value:
                type: https://github.com/philipf/gotta-go/blob/main/docs/api/errors.md#unknown-radiator
                title: Radiator not recognised
                status: 404
                detail: No radiator is configured for slug 'bedroom-attic'.
            not-found:
              summary: Unknown path (no X-Sleep-Seconds)
              value:
                type: https://github.com/philipf/gotta-go/blob/main/docs/api/errors.md#not-found
                title: Not found
                status: 404
                detail: No route matches GET /v1/frames.

    ServerError:
      description: |
        A `500` — the fault is **ours** (config or bug). One of three problem
        types:

        - **`metlink-auth`** (Fatal) — Metlink returned `401`/`403`; the
          `METLINK_API_KEY` is bad or expired. Logged at `error`; sleep `3600`.
        - **`metlink-bad-request`** (Fatal) — Metlink returned a `4xx` other than
          `429`; a stop or service id in `config.yaml` is wrong. Logged at
          `error`; sleep `3600`.
        - **`internal`** (Retryable) — any unknown thrown error. Logged at
          `error`; sleep at the active phase's sleep duration, or the firmware `300 s`
          fallback (no `X-Sleep-Seconds`) when the throw happened before a
          profile phase was resolved.

        The `metlink-*` types carry a verbose-gated `upstream_detail` snippet.
      headers:
        Content-Type:
          $ref: '#/components/headers/ContentTypeProblemJson'
        X-Sleep-Seconds:
          $ref: '#/components/headers/SleepSecondsServerError'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            metlink-auth:
              summary: Bad METLINK_API_KEY (Fatal, sleep 3600)
              value:
                type: https://github.com/philipf/gotta-go/blob/main/docs/api/errors.md#metlink-auth
                title: Transit data unavailable
                status: 500
                detail: Metlink rejected the configured API key (HTTP 403). Check METLINK_API_KEY.
                upstream_detail: '{"error":"Access denied due to invalid subscription key."}'
            metlink-bad-request:
              summary: Bad stop id in config (Fatal, sleep 3600)
              value:
                type: https://github.com/philipf/gotta-go/blob/main/docs/api/errors.md#metlink-bad-request
                title: Transit target misconfigured
                status: 500
                detail: Metlink returned HTTP 404 for stop 9999 — check the transit target stop id in config.yaml.
                upstream_detail: '{"message":"Stop not found"}'
            internal:
              summary: Unknown thrown error (Retryable, phase sleep duration)
              value:
                type: https://github.com/philipf/gotta-go/blob/main/docs/api/errors.md#internal
                title: Unexpected error
                status: 500
                detail: An unexpected error occurred while rendering the frame.

    UpstreamError:
      description: |
        A `502` — the fault is **upstream's** (Metlink). Both types are
        Retryable: the radiator simply retries on its next wake cycle, so sleep
        is the active phase's sleep duration and the log level is `warn`.

        - **`metlink-unavailable`** — Metlink `5xx`, network failure, or timeout.
        - **`metlink-rate-limited`** — Metlink `429`.

        Both carry a verbose-gated `upstream_detail` snippet.
      headers:
        Content-Type:
          $ref: '#/components/headers/ContentTypeProblemJson'
        X-Sleep-Seconds:
          $ref: '#/components/headers/SleepSecondsUpstream'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            metlink-unavailable:
              summary: Metlink down or unreachable
              value:
                type: https://github.com/philipf/gotta-go/blob/main/docs/api/errors.md#metlink-unavailable
                title: Transit data unavailable
                status: 502
                detail: Metlink is unreachable (HTTP 503). The radiator will retry on its next wake cycle.
                upstream_detail: 'upstream connect error or disconnect/reset before headers'
            metlink-rate-limited:
              summary: Metlink 429
              value:
                type: https://github.com/philipf/gotta-go/blob/main/docs/api/errors.md#metlink-rate-limited
                title: Transit data unavailable
                status: 502
                detail: Metlink returned HTTP 429 (rate limited). The radiator will retry on its next wake cycle.
                upstream_detail: '{"message":"Rate limit is exceeded. Try again in 12 seconds."}'

    Maintenance:
      description: |
        **Problem type `maintenance`.** Operator-triggered maintenance mode. Not
        part of the failure-policy catalog (ADR-0011) — an operator action, not a
        failure — but carried in the same `problem+json` envelope for
        consistency. The sleep duration is operator-chosen within the standard
        `[30, 14400]` range.
      headers:
        Content-Type:
          $ref: '#/components/headers/ContentTypeProblemJson'
        X-Sleep-Seconds:
          $ref: '#/components/headers/SleepSeconds'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          example:
            type: https://github.com/philipf/gotta-go/blob/main/docs/api/errors.md#maintenance
            title: Under maintenance
            status: 503
            detail: GottaGo is in operator-triggered maintenance mode.

  # -----------------------------------------------------------------------
  # Reusable headers
  # -----------------------------------------------------------------------

  headers:

    ContentEncodingGzip:
      description: |
        Always `gzip` on the frame body. The radiator's
        `Accept-Encoding: gzip` request header is mandatory (see ADR-0001).
      schema:
        type: string
        enum: [gzip]

    FrameETag:
      description: |
        The weak **ETag** identifying this frame's content inputs (ADR-0013):
        a hash of the layout's serialised **view model** plus its
        `LAYOUT_VERSION` constant — never the rendered bytes, so a `304` can
        be answered without running the render pipeline. Weak (`W/"…"`)
        because it asserts semantic equivalence, not byte identity.

        The radiator stores it only after a successfully flushed `200` and
        echoes it as `If-None-Match` on its next wake. Set on every `200`
        and repeated on `304` (RFC 9110 §15.4.5).
      schema:
        $ref: '#/components/schemas/WeakETag'

    ContentTypeProblemJson:
      description: |
        Always `application/problem+json` on error responses (RFC 9457),
        regardless of the negotiated success format (ADR-0011).
      schema:
        type: string
        enum: [application/problem+json]

    SleepSeconds:
      description: |
        The **sleep duration** — whole seconds the radiator must deep-sleep
        before its next wake cycle. Sent on **every Worker response**,
        including errors, so the Worker stays in control of retry timing
        during incidents.

        **Bounds.**
        - Floor `30` — stops a misconfigured Worker from flooding the
          radiator.
        - Ceiling `14400` (4 h) — matches the idle-profile cap and forces a
          wake at least every 4 h so a config bug cannot silently park the
          radiator forever.

        **Firmware fallback.** If the radiator receives no response, or the
        header is absent, or it parses outside `[1, 86400]`, the firmware
        sleeps for a compile-time constant of `300` seconds (5 min).
      schema:
        $ref: '#/components/schemas/SleepSeconds'
      example: 180

    SleepSecondsAuthError:
      description: |
        On auth and slug errors, sleep is fixed at `3600` (1 h). Tokens and
        slugs change rarely; an hour of back-off avoids a hot loop while
        still recovering within a working day after a re-flash or config fix.
      schema:
        $ref: '#/components/schemas/SleepSeconds'
      example: 3600

    SleepSecondsServerError:
      description: |
        On a `500` the value depends on the problem type (ADR-0011):

        - **`metlink-auth`, `metlink-bad-request`** (Fatal) — `3600` (1 h). A
          config error a human must fix; a tight retry loop against it is noise.
        - **`internal`** (Retryable) — the active **profile phase**'s sleep duration (the
          same value a `200` would have used). Omitted entirely when the error
          was thrown before a phase could be resolved, in which case the
          firmware's `300 s` fallback applies.
      schema:
        $ref: '#/components/schemas/SleepSeconds'
      example: 3600

    SleepSecondsUpstream:
      description: |
        On a `502` (`metlink-unavailable`, `metlink-rate-limited`) sleep is the
        active **profile phase**'s sleep duration — the same value a `200` would have
        used. Both types are Retryable: Metlink outages are typically brief, so
        the radiator just retries on its next regular wake cycle rather than
        backing off (ADR-0011).
      schema:
        $ref: '#/components/schemas/SleepSeconds'
      example: 180

    ServerTime:
      description: |
        The Worker's clock at request time (ISO 8601 UTC). Set on every
        response with a meaningful value.

        **Observability data — the radiator ignores it.** Used by humans
        running `curl` to verify there is no clock skew between Cloudflare's
        edge and operator expectation. Profile-phase resolution is
        server-time driven (PRD §6).
      schema:
        type: string
        format: date-time
      example: 2026-05-23T06:48:12Z

    ProfilePhase:
      description: |
        The **profile phase** the Worker resolved for this request:

        - A configured phase key (e.g. `morning_commute`, `evening_return`).
        - The literal `idle_profile` when the fallback profile took over.
        - The literal `none` on auth/slug errors where no profile could be
          resolved.

        Set on every response. Observability data — the radiator ignores
        it.
      schema:
        type: string
        examples:
          - morning_commute
          - evening_return
          - daytime_calendar
          - idle_profile
          - none

  # -----------------------------------------------------------------------
  # Schemas
  # -----------------------------------------------------------------------

  schemas:

    RadiatorSlug:
      type: string
      pattern: '^[a-z0-9-]{3,64}$'
      description: |
        Lowercase kebab-case identifier for one radiator. Hardcoded as a
        compile-time firmware constant; appears in the `X-Radiator-Slug`
        header.
      examples:
        - bedroom-philip-tania
        - fridge
        - daughter-school

    FrameViewModelEnvelope:
      type: object
      description: |
        The **view model** fed to the renderer for this request (ADR-0004),
        returned when `Accept: application/json`. It leads with the
        cross-cutting diagnostics fields — the active **profile phase**, the
        **layout**, and the observability values that also appear as response
        headers — then carries the layout's view-model fields, which depend on
        `layout`:

        - `priority_split` → `wall_clock` plus a `columns` array (one entry per
          **transit target**).
        - `minimal_clock` → `slug`, `time`, `date`.

        Every field name reuses the glossary vocabulary verbatim. The values are
        exactly what Satori was fed — the JSON variant is a serialiser of the
        rendered view model, never a parallel definition.
      required: [profile_phase, layout, server_time]
      properties:
        profile_phase:
          type: string
          description: |
            The resolved **profile phase** for this request — the same value as
            the `X-Profile-Phase` header.
          examples:
            - morning_school_run
            - daytime_calendar
            - idle_profile
        layout:
          type: string
          description: The **layout** that produced this render.
          examples:
            - priority_split
            - dual_month_calendar
            - minimal_clock
        server_time:
          type: string
          format: date-time
          description: The Worker clock at request time — mirrors `X-Server-Time`.
          example: 2026-05-23T06:48:12.000Z
        wall_clock:
          type: string
          description: |
            The **wall-clock time** in the global header. `priority_split` only.
          example: '07:30'
        columns:
          type: array
          description: |
            One entry per **transit target**, in config order. `priority_split`
            only. A single target renders one full-width column.
          items:
            $ref: '#/components/schemas/FrameColumn'
        slug:
          allOf:
            - $ref: '#/components/schemas/RadiatorSlug'
          description: The **radiator slug**. `minimal_clock` only.
        time:
          type: string
          description: The 24-hour `HH:MM` wall-clock time. `minimal_clock` only.
          example: '18:48'
        date:
          type: string
          description: The `Dow DD Mon` date. `minimal_clock` only.
          example: Sat 23 May
        frame_bmp_base64:
          type: string
          format: byte
          description: |
            Base64 of the raw 1-bit BMP for this render. Present only when
            `?include_bmp=1` was sent; the decoded bytes are byte-identical to
            the BMP an `Accept: image/bmp` sibling call would have returned at
            the same instant.

    FrameColumn:
      type: object
      description: |
        One **transit target** column's rendered view-model fields. The string
        fields hold the exact display strings Satori was fed (label + value),
        so they read the same as the panel — e.g. `LEAVE IN` reads `7 MIN` or
        the literal `NOW`, and dashes (`—`) mark a degraded/no-service column.
      properties:
        mode:
          type: string
          enum: [bus, train]
          description: The transit target's **mode**.
        service_id:
          type: string
          description: |
            The selected service's upstream `service_id`, shown as the leading
            part of the **service name** in the column header.
          example: '1'
        trip_headsign:
          type: string
          description: |
            The destination **trip headsign**, shown after the `service_id` in
            the column header (`service_id · trip_headsign`). Empty string when
            unknown or in a degraded/no-service column.
          example: Island Bay
        leave_in:
          type: string
          description: The Tier 1 **Leave In** hero value — `n MIN` or `NOW`.
          example: 7 MIN
        leave_by:
          type: string
          description: The Tier 2 **Leave By** clock time.
          example: BY 07:37
        arrives:
          type: string
          description: |
            The Tier 2 **Arrives In** + **arrival time** detail, as one string.
          example: ARRIVES 12 MIN · 07:42
        next:
          type: string
          description: The Tier 3 **Next service** footnote — `NEXT hh:mm` or `—`.
          example: NEXT 07:54
        marker_ratio:
          type: number
          minimum: 0
          maximum: 1
          description: |
            The **marker** position on the track: `0` hard-left, `1` at **Now**.
          example: 0.1667

    SleepSeconds:
      type: integer
      minimum: 30
      maximum: 14400
      description: |
        Whole-second sleep duration. See the `X-Sleep-Seconds` header for
        full semantics and bounds rationale.

    WeakETag:
      type: string
      pattern: '^W/"[^"]+"$'
      description: |
        An RFC 9110 weak entity tag (`W/"…"`). Opaque to the radiator — it
        stores and echoes the string verbatim, never inspecting it. See the
        `ETag` response header and the `If-None-Match` request parameter for
        semantics (ADR-0013).
      examples:
        - W/"9f3a51c87b20e6d4"

    ProblemDetails:
      type: object
      description: |
        An [RFC 9457](https://www.rfc-editor.org/rfc/rfc9457) problem document —
        the `application/problem+json` body returned on **every** non-2xx
        response, regardless of the negotiated success format (ADR-0011). The
        firmware renders one generic error screen from it (heading = `title`,
        body = `detail`); `upstream_detail` is shown only under the firmware's
        `verbose` flag. `X-Sleep-Seconds` is a response **header**, never a
        member of this body.

        The `type` URL is the stable identity of the problem and dereferences to
        the matching anchor in [errors.md](errors.md). The catalogued
        slugs are `metlink-auth`, `metlink-bad-request`, `metlink-unavailable`,
        `metlink-rate-limited`, `internal`, `unauthorized`, `unknown-radiator`,
        `not-found`, and `maintenance`.
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          description: |
            HTTPS URL identifying the problem type; dereferences to the matching
            anchor in `errors.md`. Clients match on this value, so it is stable
            across occurrences.
          example: https://github.com/philipf/gotta-go/blob/main/docs/api/errors.md#metlink-auth
        title:
          type: string
          description: |
            Short, human-readable summary of the problem *type* — stable across
            occurrences. Doubles as the firmware error-screen heading.
          example: Transit data unavailable
        status:
          type: integer
          minimum: 400
          maximum: 599
          description: |
            The HTTP status code, duplicated in the body (RFC 9457 §3.1) so the
            document is self-describing when logged or forwarded.
          example: 500
        detail:
          type: string
          description: |
            Human-readable explanation specific to *this* occurrence (which
            stop, which upstream status, …).
          example: Metlink rejected the configured API key (HTTP 403). Check METLINK_API_KEY.
        instance:
          type: string
          format: uri
          description: |
            `urn:gotta-go:request:<requestId>`, where `<requestId>` is the
            inbound `X-Request-Id`. Omitted when no `X-Request-Id` was supplied.
          example: urn:gotta-go:request:01HFV0Q3K8N2W7E6R5T4Y3U2I1
        upstream_detail:
          type: string
          maxLength: 2048
          description: |
            Extension member (RFC 9457 §3.2): the raw upstream snippet (e.g.
            Metlink's error body), capped at 2 KB — the same cap the structured
            logs use. Present only on problem types with an upstream cause
            (`metlink-*`). The firmware renders it only under its `verbose` flag;
            other clients ignore unknown extension members.
          example: '{"error":"Access denied due to invalid subscription key."}'
