# pnpm settings. Deps whose postinstall build scripts are approved to run;
# without approval, pnpm hard-fails CI installs with ERR_PNPM_IGNORED_BUILDS.
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true

# Force patched versions of dev-only transitive deps flagged by Dependabot.
# All are pulled in by the Cloudflare test toolchain (vitest-pool-workers ->
# wrangler/miniflare) and never ship in the deployed Worker bundle, but we pin
# the security-patched releases to keep the dependency graph clean.
overrides:
  undici@>=7.0.0 <7.28.0: ^7.28.0
  ws@>=8.0.0 <8.21.0: ^8.21.0
  vite@>=7.0.0 <7.3.5: ^7.3.5
  esbuild@<0.28.1: ^0.28.1
