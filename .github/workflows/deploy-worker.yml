# CI/CD for the Worker (GH #85).
#
# test:   typecheck + vitest, on PRs and pushes to main.
# deploy: wrangler deploy + production smoke test, on pushes to main only
#         (workflow_dispatch as a manual backup trigger).
#
# Required repository secrets:
#   CLOUDFLARE_API_TOKEN   — API token scoped to Workers Scripts:Edit on the account
#   CLOUDFLARE_ACCOUNT_ID  — the Cloudflare account id
#   RADIATOR_SHARED_TOKEN  — prod radiator token, used by tests/smoke-prod-test.sh
name: Worker CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: src/worker

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Single source of truth for node/pnpm versions: src/worker/mise.toml
      - uses: jdx/mise-action@v4
        with:
          working_directory: src/worker

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test --run

  deploy:
    needs: test
    # push is already restricted to main; this only excludes pull_request runs.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    # Serialize deploys so two merges can't interleave deploy + smoke.
    concurrency:
      group: deploy-worker
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4
        with:
          working_directory: src/worker

      - run: pnpm install --frozen-lockfile

      - name: Deploy Worker
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Confirms the deployed Worker answers a real wake cycle; a deploy that
      # breaks rendering goes red here instead of on the radiator.
      - name: Production smoke test
        working-directory: tests
        run: ./smoke-prod-test.sh
        env:
          RADIATOR_SHARED_TOKEN: ${{ secrets.RADIATOR_SHARED_TOKEN }}
