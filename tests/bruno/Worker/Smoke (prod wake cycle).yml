info:
  name: Smoke (prod wake cycle)
  type: http
  seq: 9

http:
  method: GET
  url: "{{base-uri}}/v1/frame"
  headers:
    - name: X-Radiator-Slug
      value: bedroom-philip-tania
    - name: Accept
      value: image/bmp
    - name: Accept-Encoding
      value: gzip
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Production smoke test — confirm the deployed Worker answers a real wake cycle.

  Run against the **Cloudflare** environment (sets base-uri to the prod Worker
  and supplies the prod Radiator-Token secret). Mirrors exactly what the physical
  radiator sends: the BMP path, no X-Debug-Now, so it exercises real server time.

  Expect 200 + Content-Type: image/bmp with the observability headers:
    X-Profile-Phase  (e.g. all_day_clock — proves a phase resolved)
    X-Sleep-Seconds
    X-Server-Time

  Auth inherits the collection's X-Radiator-Token apikey ({{Radiator-Token}}).
  The CLI equivalent is tests/smoke-prod-test.sh (mise run smoke).
