info:
  name: Frame JSON + include_bmp
  type: http
  seq: 4

http:
  method: GET
  url: "{{base-uri}}/v1/frame?include_bmp=1"
  params:
    - name: include_bmp
      value: "1"
      type: query
  headers:
    - name: X-Radiator-Slug
      value: "{{radiator-slug}}"
    - name: Accept
      value: application/json
    - name: X-Debug-Now
      value: 2026-05-23T06:48:00Z
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Opt-in BMP round-trip for the diagnostics view (#19 / ADR-0004). Same
  minimal_clock render as "Frame JSON (minimal_clock)" but with ?include_bmp=1,
  so the envelope gains a frame_bmp_base64 field.

  Expect 200 + Content-Type: application/json, the minimal_clock envelope, plus:
    frame_bmp_base64: base64 of the raw 1-bit BMP.

  Byte-identity check (run manually): base64-decode frame_bmp_base64 → it is a
  64,862-byte BMP starting with "BM" (0x42 0x4D), byte-identical to the
  decompressed body of a sibling "Get Frame" request (Accept: image/bmp,
  Content-Encoding: gzip). minimal_clock is used because it takes no Metlink
  input, so the two renders are deterministic. To make the match exact, send the
  sibling at the same instant: add X-Debug-Now: 2026-05-23T06:48:00Z to "Get
  Frame" (it omits it by default and would otherwise render the live clock).
