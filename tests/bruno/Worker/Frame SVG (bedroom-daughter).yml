info:
  name: Frame SVG (bedroom-daughter)
  type: http
  seq: 6

http:
  method: GET
  url: "{{base-uri}}/v1/frame"
  headers:
    - name: X-Radiator-Slug
      value: bedroom-daughter
    - name: Accept
      value: image/svg+xml
    - name: Accept-Encoding
      value: gzip
    - name: X-Debug-Now
      value: 2026-05-22T19:30:00Z
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Intermediate Satori SVG for the priority_split layout (#20 / ADR-0004) over a
  live Metlink fetch for the daughter-school bus (stop 3234, routes 634/635).

  Expect 200 + Content-Type: image/svg+xml + Content-Encoding: gzip. The body is
  the exact SVG the BMP encoder rasterises for this render; the observability
  headers match the image/bmp and application/json variants for the same
  request.

  Bruno does not gunzip the body. To inspect it visually, run from a shell:
    curl -H "X-Radiator-Token: $TOKEN" -H "X-Radiator-Slug: bedroom-daughter" \
         -H "Accept: image/svg+xml" -H "X-Debug-Now: 2026-05-22T19:30:00Z" \
         --compressed http://localhost:8787/v1/frame -o frame.svg && xdg-open frame.svg
  It should show the global wall-clock (07:30) above a single full-width column
  (mode icon + route code, LEAVE IN hero, BY / ARRIVES, track + marker, NEXT).

  X-Debug-Now pins server time into the 07:15–08:30 phase window so the phase
  resolves to priority_split; it requires DEV_TIME_OVERRIDE=true (Local env /
  wrangler dev). Metlink has no historic data (ADR-0002), so a pinned past time
  yields catchable services only if buses are actually predicted now; otherwise
  the column degrades to dashes — still a valid SVG to inspect.
