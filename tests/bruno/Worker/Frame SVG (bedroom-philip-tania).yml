info:
  name: Frame SVG (bedroom-philip-tania)
  type: http
  seq: 5

http:
  method: GET
  url: "{{base-uri}}/v1/frame"
  headers:
    - name: X-Radiator-Slug
      value: bedroom-philip-tania
    - name: Accept
      value: image/svg+xml
    - name: Accept-Encoding
      value: gzip
    - name: X-Debug-Now
      value: 2026-05-30T19:30:00Z
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Intermediate Satori SVG for the minimal_clock layout (#20 / ADR-0004).

  Expect 200 + Content-Type: image/svg+xml + Content-Encoding: gzip. The body is
  the exact SVG the BMP encoder rasterises for this render — the observability
  headers (X-Server-Time, X-Profile-Phase, X-Sleep-Seconds) match the image/bmp
  and application/json variants for the same request.

  Bruno does not gunzip the body. To inspect it, run from a shell:
    curl -H "X-Radiator-Token: $TOKEN" -H "X-Radiator-Slug: bedroom-philip-tania" \
         -H "Accept: image/svg+xml" -H "X-Debug-Now: 2026-05-23T06:48:00Z" \
         --compressed http://localhost:8787/v1/frame -o frame.svg && xdg-open frame.svg
  It should show 18:48 above "Sat 23 May" in DejaVu Sans Bold.

  X-Debug-Now pins server time so the rendered clock is deterministic; it only
  takes effect when DEV_TIME_OVERRIDE=true (the Local env / wrangler dev), and
  is ignored in production.
