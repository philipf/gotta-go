info:
  name: Frame JSON (minimal_clock)
  type: http
  seq: 2

http:
  method: GET
  url: "{{base-uri}}/v1/frame"
  headers:
    - name: X-Radiator-Slug
      value: "{{radiator-slug}}"
    - name: Accept
      value: application/json
    - name: X-Debug-Now
      value: 2026-05-23T06:48:00Z
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Diagnostics view-model envelope for the minimal_clock layout (#19 / ADR-0004).

  Expect 200 + Content-Type: application/json with:
    profile_phase: all_day_clock
    layout: minimal_clock
    server_time / slug / time (18:48) / date (Sat 23 May)
    no frame_bmp_base64 field.

  X-Debug-Now pins server time so the rendered clock is deterministic; it only
  takes effect when DEV_TIME_OVERRIDE=true (the Local env / wrangler dev), and
  is ignored in production.
