info:
  name: Frame JSON (priority_split)
  type: http
  seq: 3

http:
  method: GET
  url: "{{base-uri}}/v1/frame"
  headers:
    - name: X-Radiator-Slug
      value: bedroom-daughter
    - name: Accept
      value: application/json
    - name: X-Debug-Now
      value: 2026-05-22T19:30:00Z
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Diagnostics view-model envelope for the priority_split layout (#19 / ADR-0004).
  Makes a live Metlink fetch for the daughter-school bus (stop 3234, routes
  634/635).

  Expect 200 + Content-Type: application/json with:
    profile_phase: morning_school_run
    layout: priority_split
    wall_clock: 07:30
    columns[0]: { mode, route_code, leave_in, leave_by, arrives, next, marker_ratio }

  The column fields hold the exact display strings Satori is fed (e.g. "7 MIN",
  "ARRIVES 12 MIN · 07:42"); they degrade to "—" with marker_ratio 1 when there
  is no catchable service (e.g. outside school-bus hours).

  X-Debug-Now pins server time into the 07:15–08:30 phase window so the phase
  resolves to priority_split; it requires DEV_TIME_OVERRIDE=true (Local env /
  wrangler dev). Note: Metlink has no historic data (ADR-0002), so a pinned past
  time yields catchable services only if buses are actually predicted now.
