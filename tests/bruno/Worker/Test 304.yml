info:
  name: Test 304
  type: http
  seq: 10

http:
  method: GET
  url: "{{base-uri}}/v1/frame"
  headers:
    - name: X-Radiator-Slug
      value: "{{radiator-slug}}"
    - name: Accept
      value: image/bmp
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        // Echo back the ETag captured by the previous run, mirroring the
        // radiator's If-None-Match behaviour. First run (or after the var is
        // cleared) sends no If-None-Match, so the server answers 200.
        const etag = bru.getVar("frame-etag");
        if (etag) {
          req.setHeader("If-None-Match", etag);
        }
    - type: after-response
      code: |-
        // Store the ETag for the next run — no assertions, just convenience.
        // The server repeats the ETag on a 304 too, so the var stays fresh.
        const etag = res.getHeader("etag");
        if (etag) {
          bru.setVar("frame-etag", etag);
        }
        console.log(`Test 304: status ${res.status}, ETag ${etag}`);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Conditional frame request — ETag/304 unchanged-frame skip (#73 / ADR-0013).

  Run it twice in quick succession:
    1st run: no stored ETag → 200 + ETag header (script saves it to the
             frame-etag runtime variable).
    2nd run: script echoes the saved ETag as If-None-Match → expect
             304 Not Modified with no body, plus the usual observability
             headers (X-Sleep-Seconds, X-Server-Time) and the repeated ETag.

  Notes:
    - Accept: image/bmp is required — the 304 skip only applies to the BMP
      wake-cycle path; JSON/SVG diagnostics always render a 200.
    - The ETag is derived from the view model (which includes the displayed
      time), so the second run must land in the same minute as the first —
      otherwise the view model changed and a 200 is correct.
    - To force a fresh 200, clear the frame-etag runtime variable (or restart
      Bruno; runtime vars don't persist).
