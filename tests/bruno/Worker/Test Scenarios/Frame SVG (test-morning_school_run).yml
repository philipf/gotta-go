info:
  name: Frame SVG (test-morning_school_run)
  type: http
  seq: 3

http:
  method: GET
  url: "{{base-uri}}/v1/frame"
  headers:
    - name: X-Radiator-Slug
      value: test-morning_school_run
    - name: Accept
      value: image/svg+xml
    - name: Accept-Encoding
      value: gzip
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Intent-named scenario slug (GH #21). `test-morning_school_run` renders the
  daughter's one-target (bus) `priority_split` phase directly, widened to
  all-day — so it shows the school-run frame even outside the real 07:15–08:30
  window, with no X-Debug-Now needed.

  Note: this scenario makes **live Metlink calls** (stop 3234, real API key), so
  it depends on network + live transit data. For a fully offline smoke, use
  `test-all_day_clock` instead.

  Expect 200 + Content-Type: image/svg+xml + Content-Encoding: gzip, with the
  usual observability headers (X-Profile-Phase: morning_school_run, etc.).

  Bruno does not gunzip the body. To inspect it, run from a shell:
    curl -H "X-Radiator-Token: $TOKEN" -H "X-Radiator-Slug: test-morning_school_run" \
         -H "Accept: image/svg+xml" --compressed \
         http://localhost:8787/v1/frame -o frame.svg && xdg-open frame.svg

  Copy-me template: swap the slug for any other `test-<phaseKey>`, or change the
  Accept header (image/bmp, application/json) for the other formats.
