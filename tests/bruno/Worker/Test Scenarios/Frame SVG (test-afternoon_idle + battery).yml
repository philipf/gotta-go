info:
  name: Frame SVG (test-afternoon_idle + battery)
  type: http
  seq: 6

http:
  method: GET
  url: "{{base-uri}}/v1/frame"
  headers:
    - name: X-Radiator-Slug
      value: test-afternoon_idle
    - name: Accept
      value: image/svg+xml
    - name: Accept-Encoding
      value: gzip
    - name: X-Radiator-Battery-Mv
      value: "3950"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  The `minimal_clock` layout (GH #21 intent-named slug). The slug keys on the
  *phase* key, not the layout name — `afternoon_idle` is the phase that renders
  minimal_clock, so the slug is `test-afternoon_idle` (NOT `test-minimal_clock`,
  which 404s — there is no phase by that name).

  Battery indicator (GH #131): X-Radiator-Battery-Mv carries the raw millivolts.
  The Worker maps it through the discharge curve to a top-right battery glyph.
  Swap the value to see each state:
    - 4300  -> full + lightning bolt (charging, >= ~4250 mV)
    - 3950  -> ~3 of 5 segments
    - 3500  -> empty outline (~5%)
    - (remove the header) -> indicator hidden entirely (absent != empty)

  Expect 200 + Content-Type: image/svg+xml + Content-Encoding: gzip, with
  X-Profile-Phase: afternoon_idle and X-Sleep-Seconds: 1800.

  Bruno does not gunzip the body. To inspect it, run from a shell:
    curl -H "Authorization: Bearer $TOKEN" -H "X-Radiator-Slug: test-afternoon_idle" \
         -H "X-Radiator-Battery-Mv: 3950" -H "Accept: image/svg+xml" --compressed \
         http://localhost:8787/v1/frame -o frame.svg && xdg-open frame.svg

  Copy-me template: swap the slug for any other `test-<phaseKey>`, or change the
  Accept header (image/bmp, application/json) for the other formats. On the JSON
  format the derived battery state shows up under view.battery.
