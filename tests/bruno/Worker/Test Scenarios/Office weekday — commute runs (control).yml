info:
  name: Office weekday — commute runs (control)
  type: http
  seq: 9

http:
  method: GET
  url: "{{base-uri}}/v1/frame"
  headers:
    - name: X-Radiator-Slug
      value: office-f5
    - name: X-Debug-Now
      value: 2026-06-15T16:00:00+12:00
    - name: Accept
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Office radiator, Monday afternoon (weekday control, #92 / ADR-0015).

  X-Debug-Now pins server time to **Mon 2026-06-15 16:00 NZ**. The same 16:00
  that fell to dad jokes on Saturday (Office weekend — commute gap) now resolves
  to `office_afternoon_commute`, proving the weekday filter only suppresses the
  phase on its off-days.

  This phase is `priority_split` and fetches **live Metlink**, so a valid
  METLINK_API_KEY must be set in .dev.vars. The assert checks only the resolved
  phase via the X-Profile-Phase header, which the Worker sets even when an
  upstream Metlink error maps to a problem+json body — so the control stays
  meaningful regardless of network/key state. Status is intentionally not
  asserted for that reason.

  Expected (asserts in the original root collection):
    res.headers[x-profile-phase] eq office_afternoon_commute
