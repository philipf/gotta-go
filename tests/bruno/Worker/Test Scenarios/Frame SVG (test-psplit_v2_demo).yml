info:
  name: Frame SVG (test-psplit_v2_demo)
  type: http
  seq: 5

http:
  method: GET
  url: "{{base-uri}}/v1/frame"
  headers:
    - name: X-Radiator-Slug
      value: test-psplit_v2_demo
    - name: Accept
      value: image/svg+xml
    - name: Accept-Encoding
      value: gzip
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Intent-named scenario slug (GH #21) for the new `priority_split_v2` layout
  (GH #108 side-by-side dogfood). `test-psplit_v2_demo` renders the
  `priority_split_v2_demo` profile's single phase directly, widened to all-day —
  so it shows the v2 frame at any time, with no X-Debug-Now needed. It reuses the
  same city→home commute pair as v1, so put this request beside
  `Frame SVG (test-morning_commute)` to compare v2 against v1 on the same data.

  Note: this scenario makes **live Metlink calls** (real stops, real API key), so
  it depends on network + live transit data. Live data won't reliably produce the
  dense worst case (LAST + two heroes + 3 LATER + badges) — to pin a specific
  instant, add an `X-Debug-Now` header (requires DEV_TIME_OVERRIDE=true in the
  Worker's .dev.vars), e.g. value `2026-06-15T08:04:00+12:00`.

  Expect 200 + Content-Type: image/svg+xml + Content-Encoding: gzip, with the
  usual observability headers (X-Profile-Phase: psplit_v2_demo, etc.).

  Bruno does not gunzip the body. To inspect it, run from a shell:
    curl -H "X-Radiator-Token: $TOKEN" -H "X-Radiator-Slug: test-psplit_v2_demo" \
         -H "Accept: image/svg+xml" --compressed \
         http://localhost:8787/v1/frame -o frame.svg && xdg-open frame.svg

  Copy-me template: swap the slug for any other `test-<phaseKey>`, or change the
  Accept header (image/bmp, application/json) for the other formats.
