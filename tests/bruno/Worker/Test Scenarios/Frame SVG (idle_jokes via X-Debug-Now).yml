info:
  name: Frame SVG (idle_jokes via X-Debug-Now)
  type: http
  seq: 4

http:
  method: GET
  url: "{{base-uri}}/v1/frame"
  headers:
    - name: X-Radiator-Slug
      value: bedroom-philip-tania
    - name: X-Debug-Now
      value: 2026-06-01T23:30:00+12:00
    - name: Accept
      value: image/svg+xml
    - name: Accept-Encoding
      value: gzip
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Idle profile (idle_jokes, GH #17) scenario. There is **no** `test-idle_jokes`
  slug: the `test-<phaseKey>` mechanism widens a phase to all-day so it never
  falls through to idle. To reach idle you must drive *real* phase resolution to
  a time no phase covers — done here with the X-Debug-Now override (dev-time.ts).

  This uses the **real** `bedroom-philip-tania` slug (not a test- slug) at
  23:30 NZST. Its profile's phases run 06:30–21:00, so 21:00–06:30 falls through
  to the system idle default → `idle_jokes` (a dad joke + meme).

  Requires DEV_TIME_OVERRIDE=true in the Worker's .dev.vars (dev only — the flag
  is never set in production, so X-Debug-Now is ignored there). Without it the
  header is dropped and the real clock is used.

  Expect 200 + Content-Type: image/svg+xml + Content-Encoding: gzip, with
  X-Profile-Phase: idle_profile (the literal idle fall-through value — the idle
  profile is not a configured phase, so it has no per-profile key).

  Bruno does not gunzip the body. To inspect it, run from a shell:
    curl -H "X-Radiator-Token: $TOKEN" -H "X-Radiator-Slug: bedroom-philip-tania" \
         -H "X-Debug-Now: 2026-06-01T23:30:00+12:00" \
         -H "Accept: image/svg+xml" --compressed \
         http://localhost:8787/v1/frame -o frame.svg && xdg-open frame.svg

  Copy-me template: change X-Debug-Now to any overnight instant, or swap the slug
  for bedroom-daughter (phases end 21:00 likewise) to exercise its idle override.
